<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agua y tecnologia</title>
  <desc id="desc">Ilustracion abstracta con olas, nodos y lineas de datos</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081629" />
      <stop offset="100%" stop-color="#04090f" />
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e7bff" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#16f2ff" stop-opacity="0.8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />

  <g stroke="url(#wave)" stroke-width="2" opacity="0.45">
    <path d="M0 560 C 180 480, 360 640, 540 560 C 720 480, 900 640, 1080 560 C 1260 480, 1440 640, 1600 560" fill="none"/>
    <path d="M0 620 C 200 540, 380 700, 560 620 C 740 540, 920 700, 1100 620 C 1280 540, 1460 700, 1600 620" fill="none"/>
    <path d="M0 680 C 220 600, 400 760, 580 680 C 760 600, 940 760, 1120 680 C 1300 600, 1480 760, 1600 680" fill="none"/>
  </g>

  <g stroke="#16f2ff" stroke-opacity="0.32" stroke-width="1">
    <line x1="250" y1="280" x2="450" y2="220" />
    <line x1="450" y1="220" x2="680" y2="290" />
    <line x1="680" y1="290" x2="900" y2="210" />
    <line x1="900" y1="210" x2="1160" y2="300" />
    <line x1="1160" y1="300" x2="1380" y2="240" />
  </g>

  <g fill="#16f2ff" filter="url(#glow)">
    <circle cx="250" cy="280" r="6" />
    <circle cx="450" cy="220" r="6" />
    <circle cx="680" cy="290" r="6" />
    <circle cx="900" cy="210" r="6" />
    <circle cx="1160" cy="300" r="6" />
    <circle cx="1380" cy="240" r="6" />
  </g>
</svg>
